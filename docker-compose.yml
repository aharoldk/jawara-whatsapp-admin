networks:
  jawara:
    driver: bridge

volumes:
  waha_sessions:
  n8n_data:
  qdrant_data:
  mongo_data:

services:
  # ─── WhatsApp HTTP API ───────────────────────────────────────────────
  waha:
    image: devlikeapro/waha:latest
    container_name: jawara_waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_DEFAULT_ENGINE: NOWEB          # lightweight, no Chromium
      WHATSAPP_HOOK_URL: http://n8n:5678/webhook/waha-incoming
      WHATSAPP_HOOK_EVENTS: message,message.any
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - jawara

  # ─── AI / Workflow Automation ────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: jawara_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: http://localhost:5678   # public-facing URL if behind reverse proxy
      GENERIC_TIMEZONE: Asia/Jakarta
      N8N_LOG_LEVEL: info
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - jawara
    depends_on:
      - waha
      - qdrant

  # ─── Vector Database (for RAG) ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jawara_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - jawara

  # ─── MongoDB ─────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: jawara_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: jawara
    volumes:
      - mongo_data:/data/db
    networks:
      - jawara

  # ─── Hapi.js Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jawara_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/jawara?authSource=admin
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_SESSION: default
    networks:
      - jawara
    depends_on:
      - mongo
      - waha

  # ─── Web Admin UI ─────────────────────────────────────────────────────
  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_API_KEY: ${BACKEND_API_KEY}
        VITE_WAHA_API_KEY: ${WAHA_API_KEY}
    container_name: jawara_admin
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - jawara
    depends_on:
      - backend
      - waha
